<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables</title>
    <style>
        table{
            width: 90%;
            border-collapse: collapse;
        }
        td,th{
            border: 1px solid black;
            text-align: center;
            padding: 5px;
        }
        /* tr{ */
            /* for adding color to the entire table rows */
            /* background-color:pink; }*/
        tr:nth-child(odd){
            background-color:pink;
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>Gender</th>
        </tr>
        <tr>
            <td>Mishka</td>
            <td>33</td>
            <td>Female</td>
        </tr>
        <tr>
            <td>Ram</td>
            <td>45</td>
            <td>Male</td>
        </tr>
        <tr>
            <td>Shreya</td>
            <td>26</td>
            <td>Female</td>
        </tr>
        <tr>
            <td>Satish</td>
            <td>35</td>
            <td>Male</td>
        </tr>
    </table>
    
</body>
</html>
