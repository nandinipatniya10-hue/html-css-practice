<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>image</title>
</head>
<body>
    <img src="https://images.pexels.com/photos/35054704/pexels-photo-35054704.jpeg" width="400px" height="500px" alt="image can't be loaded due to technical issue">
    <!-- Here src is the link or address of the image and alt is the alternative text that will be visible when image fails to load -->
     <picture>
        <source srcset="https://images.pexels.com/photos/35054704/pexels-photo-35054704.jpeg"/>
        <img src="https://images.pexels.com/photos/35054704/pexels-photo-35054704.jpeg" alt="no image" width="250px" height="300px">
     </picture>
</html>
